services:
  - type: cron
    name: shiro-bot
    schedule: "0 */4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python shiro.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Mis Criptos
      - key: GOOGLE_WORKSHEET_NAME
        value: Portafolio
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false